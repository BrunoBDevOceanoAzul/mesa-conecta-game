name: ci-cd-doks

on:
  push:
    branches:
      - develop
      - homolog
      - main
    paths:
      - "src/**"
      - "apps/**"
      - "k8s/**"
      - "Dockerfile"
      - "nginx.conf"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-cd-doks.yml"
  pull_request:
    branches:
      - homolog
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: brunobdevoceanoazul/mesa-conecta-game/mesa-web
  IMAGE_API: brunobdevoceanoazul/mesa-conecta-game/mesa-api
  NODE_VERSION: "22.16.0"

jobs:
  validate:
    name: Validate codebase
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint audit
        continue-on-error: true
        run: npm run lint

      - name: Test frontend
        run: npm test -- --run

      - name: Typecheck API
        run: npm run -w apps/mesa-api typecheck

      - name: Test API
        run: npm run -w apps/mesa-api test

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
          VITE_MESA_API_URL: /api
        run: npm run build

  scan:
    name: Security scan
    runs-on: ubuntu-24.04
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  build-push:
    name: Build and push images
    runs-on: ubuntu-24.04
    needs: [validate, scan]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Docker metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_APP_URL=${{ vars.VITE_APP_URL }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: ./apps/mesa-api
          file: ./apps/mesa-api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-24.04
    needs: build-push
    if: github.ref_name == 'develop'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.33.0

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to dev
        run: |
          export KUBECONFIG=kubeconfig
          kubectl kustomize k8s/overlays/dev | kubectl apply -f -

      - name: Verify rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/dev-mesa-web -n mesa-dev --timeout=300s
          kubectl rollout status deployment/dev-mesa-api -n mesa-dev --timeout=300s

  test-homolog:
    name: Test suite for Homolog
    runs-on: ubuntu-24.04
    needs: build-push
    if: github.event_name == 'pull_request' && github.base_ref == 'homolog'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        id: tests
        run: |
          npm run -w apps/mesa-api test
          npm test -- --run
        continue-on-error: true

      - name: Set failure flag
        if: steps.tests.outcome == 'failure'
        run: echo "TESTS_FAILED=true" >> "$GITHUB_ENV"

      - name: Send failure email
        if: env.TESTS_FAILED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "❌ [HOMOLOG] Testes falharam — PR #${{ github.event.pull_request.number }}"
          to: bruno@sociodotabuleiro.app.br
          from: noreply@mesaconecta.com
          html_body: |
            <h2>Testes falharam na Homolog</h2>
            <p>PR: ${{ github.event.pull_request.html_url }}</p>
            <p>Branch: ${{ github.head_ref }}</p>
            <p>Commit: ${{ github.sha }}</p>
            <p>Action: <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Ver logs</a></p>

      - name: Fail if tests failed
        if: env.TESTS_FAILED == 'true'
        run: exit 1

  deploy-homolog:
    name: Deploy to Homolog
    runs-on: ubuntu-24.04
    needs: test-homolog
    if: github.event_name == 'pull_request' && github.base_ref == 'homolog' && github.event.pull_request.merged == true
    environment: homolog
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.33.0

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_HOMOLOG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to homolog
        run: |
          export KUBECONFIG=kubeconfig
          kubectl kustomize k8s/overlays/homolog | kubectl apply -f -

      - name: Verify rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/homolog-mesa-web -n mesa-homolog --timeout=300s
          kubectl rollout status deployment/homolog-mesa-api -n mesa-homolog --timeout=300s

      - name: Send approval email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "✅ [HOMOLOG] Deploy aprovado — Pronto para Produção"
          to: bruno@sociodotabuleiro.app.br
          from: noreply@mesaconecta.com
          html_body: |
            <h2>Homolog aprovada e deploy concluído</h2>
            <p>O ambiente de homolog está pronto para promoção à produção.</p>
            <p>Commit: ${{ github.sha }}</p>
            <p>Abra um PR de <code>homolog</code> → <code>main</code> para promover.</p>
            <p><a href="https://homolog.mesaconecta.com">Acessar Homolog</a></p>

  test-prod:
    name: Test suite for Production
    runs-on: ubuntu-24.04
    needs: build-push
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Run full test suite
        id: tests
        run: |
          npm run -w apps/mesa-api test
          npm test -- --run
        continue-on-error: true

      - name: Send failure email
        if: steps.tests.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "❌ [PROD] Testes falharam — PR #${{ github.event.pull_request.number }}"
          to: bruno@sociodotabuleiro.app.br
          from: noreply@mesaconecta.com
          html_body: |
            <h2>Testes falharam antes de ir para Produção</h2>
            <p>PR: ${{ github.event.pull_request.html_url }}</p>
            <p>Action: <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Ver logs</a></p>

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    needs: test-prod
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.pull_request.merged == true
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.33.0

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to prod
        run: |
          export KUBECONFIG=kubeconfig
          kubectl kustomize k8s/overlays/prod | kubectl apply -f -

      - name: Verify rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/prod-mesa-web -n mesa-prod --timeout=300s
          kubectl rollout status deployment/prod-mesa-api -n mesa-prod --timeout=300s

      - name: Send production deploy email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "🚀 [PROD] Deploy em Produção concluído"
          to: bruno@sociodotabuleiro.app.br
          from: noreply@mesaconecta.com
          html_body: |
            <h2>Deploy em Produção concluído com sucesso</h2>
            <p>Commit: ${{ github.sha }}</p>
            <p><a href="https://mesaconecta.com">Acessar Produção</a></p>
