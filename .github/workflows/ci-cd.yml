name: ci-cd

on:
  push:
    branches:
      - main
      - develop
      - "frontend-*"
      - "api-*"
      - "infra-*"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: brunobdevoceanoazul/mesa-conecta-game/mesa-web
  NODE_VERSION: "22.16.0"

jobs:
  validate:
    name: Validate frontend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint audit
        continue-on-error: true
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
        run: npm run build

  image:
    name: Build and publish image
    runs-on: ubuntu-24.04
    needs: validate
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_APP_URL=${{ vars.VITE_APP_URL }}

  gitops-handoff:
    name: GitOps handoff
    runs-on: ubuntu-24.04
    needs: image
    if: github.event_name == 'push'
    steps:
      - name: Summarize declarative deployment
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## GitOps handoff

          Image pushed to GHCR:

          \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`

          Argo CD watches the declarative manifests in \`k8s/overlays/*\`.
          Argo CD Image Updater can promote the new image tag by updating the Git state.
          EOF

  manifests:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.7

      - name: Render production manifests
        run: kubectl kustomize k8s/overlays/production

      - name: Render staging manifests
        run: kubectl kustomize k8s/overlays/staging
