server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /_next/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /login {
    try_files /Login/index.html /index.html;
  }

  location = /login/ {
    try_files /Login/index.html /index.html;
  }

  location = /cadastro {
    try_files /Signup/index.html /index.html;
  }

  location = /cadastro/ {
    try_files /Signup/index.html /index.html;
  }

  location = /quem-somos {
    try_files /QuemSomos/index.html /index.html;
  }

  location = /quem-somos/ {
    try_files /QuemSomos/index.html /index.html;
  }

  location = /faq {
    try_files /FAQPage/index.html /index.html;
  }

  location = /faq/ {
    try_files /FAQPage/index.html /index.html;
  }

  location = /contato {
    try_files /Contato/index.html /index.html;
  }

  location = /contato/ {
    try_files /Contato/index.html /index.html;
  }

  location = /privacidade {
    try_files /PrivacyPolicy/index.html /index.html;
  }

  location = /privacidade/ {
    try_files /PrivacyPolicy/index.html /index.html;
  }

  location = /termos {
    try_files /TermsOfService/index.html /index.html;
  }

  location = /termos/ {
    try_files /TermsOfService/index.html /index.html;
  }

  location = /interesse {
    try_files /Interesse/index.html /index.html;
  }

  location = /interesse/ {
    try_files /Interesse/index.html /index.html;
  }

  location = /para-lojas {
    try_files /ParaLojas/index.html /index.html;
  }

  location = /para-lojas/ {
    try_files /ParaLojas/index.html /index.html;
  }

  location = /para-marcas {
    try_files /ParaMarcas/index.html /index.html;
  }

  location = /para-marcas/ {
    try_files /ParaMarcas/index.html /index.html;
  }

  location = /reset-password {
    try_files /ResetPassword/index.html /index.html;
  }

  location = /reset-password/ {
    try_files /ResetPassword/index.html /index.html;
  }

  location = /~oauth {
    try_files /OAuthCallback/index.html /index.html;
  }

  location = /~oauth/ {
    try_files /OAuthCallback/index.html /index.html;
  }

  location = /hive {
    try_files /hive/index.html /index.html;
  }

  location = /hive/ {
    try_files /hive/index.html /index.html;
  }

  location = /feed {
    try_files /Feed/index.html /index.html;
  }

  location = /feed/ {
    try_files /Feed/index.html /index.html;
  }

  location = /billing {
    try_files /Billing/index.html /index.html;
  }

  location = /billing/ {
    try_files /Billing/index.html /index.html;
  }

  location = /agenda {
    try_files /Agenda/index.html /index.html;
  }

  location = /agenda/ {
    try_files /Agenda/index.html /index.html;
  }

  location = /checkout {
    try_files /Checkout/index.html /index.html;
  }

  location = /checkout/ {
    try_files /Checkout/index.html /index.html;
  }

  location = /admin {
    try_files /Admin/index.html /index.html;
  }

  location = /admin/ {
    try_files /Admin/index.html /index.html;
  }

  location = /admin/insights {
    try_files /admin/AdminInsights/index.html /index.html;
  }

  location = /admin/insights/ {
    try_files /admin/AdminInsights/index.html /index.html;
  }

  location = /admin/usuarios {
    try_files /admin/AdminUsers/index.html /index.html;
  }

  location = /admin/usuarios/ {
    try_files /admin/AdminUsers/index.html /index.html;
  }

  location = /admin/reviews {
    try_files /admin/AdminReviews/index.html /index.html;
  }

  location = /admin/reviews/ {
    try_files /admin/AdminReviews/index.html /index.html;
  }

  location = /admin/feedback {
    try_files /admin/AdminFeedbackInsights/index.html /index.html;
  }

  location = /admin/feedback/ {
    try_files /admin/AdminFeedbackInsights/index.html /index.html;
  }

  location = /admin/campanha {
    try_files /admin/AdminCampaign/index.html /index.html;
  }

  location = /admin/campanha/ {
    try_files /admin/AdminCampaign/index.html /index.html;
  }

  location = /admin/catalogo {
    try_files /admin/AdminCatalog/index.html /index.html;
  }

  location = /admin/catalogo/ {
    try_files /admin/AdminCatalog/index.html /index.html;
  }

  location = /admin/social {
    try_files /admin/AdminSocialPublisher/index.html /index.html;
  }

  location = /admin/social/ {
    try_files /admin/AdminSocialPublisher/index.html /index.html;
  }

  location = /admin/configuracoes {
    try_files /admin/AdminSettings/index.html /index.html;
  }

  location = /admin/configuracoes/ {
    try_files /admin/AdminSettings/index.html /index.html;
  }

  location ~ ^/loja/[^/]+/?$ {
    try_files /loja/[slug]/index.html /index.html;
  }

  location ~ ^/mestre/[^/]+/?$ {
    try_files /mestre/[slug]/index.html /index.html;
  }

  location ~ ^/post/[^/]+/?$ {
    try_files /post/[slug]/index.html /index.html;
  }

  location ~ ^/mesa/[^/]+/?$ {
    try_files /mesa/[id]/index.html /index.html;
  }

  location ~ ^/mesa/[^/]+/ficha/?$ {
    try_files /mesa/[id]/ficha/index.html /index.html;
  }

  location / {
    try_files $uri $uri/ $uri/index.html /index.html;
  }
}
