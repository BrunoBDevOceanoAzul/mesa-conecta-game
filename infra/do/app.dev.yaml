name: socio-app-dev
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

ingress:
  rules:
    - component:
        name: mesa-web
      match:
        path:
          prefix: /
    - component:
        name: mesa-api
      match:
        path:
          prefix: /api

static_sites:
  - name: mesa-web
    github:
      repo: BrunoBDevOceanoAzul/mesa-conecta-game
      branch: develop
      deploy_on_push: true
    source_dir: /
    dockerfile_path: infra/docker/Dockerfile
    output_dir: dist
    http_port: 8080
    envs:
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
        value: "__NEXT_PUBLIC_SUPABASE_URL__"
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        scope: BUILD_TIME
        type: SECRET
        value: "__NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY__"
      - key: NEXT_PUBLIC_APP_URL
        scope: BUILD_TIME
        type: SECRET
        value: "https://dev.sociodotabuleiro.app.br"
      - key: NEXT_PUBLIC_MESA_API_URL
        scope: BUILD_TIME
        value: "/api"
      - key: NEXT_PUBLIC_ENV
        scope: BUILD_TIME
        value: "development"

services:
  - name: mesa-api
    github:
      repo: BrunoBDevOceanoAzul/mesa-conecta-game
      branch: develop
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8787
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: "development"
      - key: PORT
        scope: RUN_TIME
        value: "8787"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "__DATABASE_URL__"
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "__SUPABASE_URL__"
      - key: SUPABASE_ANON_KEY
        scope: RUN_TIME
        type: SECRET
        value: "__SUPABASE_ANON_KEY__"
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
        value: "__SUPABASE_SERVICE_ROLE_KEY__"
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: "__JWT_SECRET__"
      - key: CUSTOMERIO_CDP_WRITE_KEY
        scope: RUN_TIME
        type: SECRET
        value: "__CUSTOMERIO_CDP_WRITE_KEY__"
      - key: CUSTOMERIO_CDP_API_BASE_URL
        scope: RUN_TIME
        value: "https://cdp.customer.io/v1"
