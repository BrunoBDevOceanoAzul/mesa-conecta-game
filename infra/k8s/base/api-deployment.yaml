apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesa-api
  labels:
    app.kubernetes.io/name: mesa-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: mesa-conecta-game
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mesa-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mesa-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: mesa-conecta-game
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-secret
        - name: gitlab-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mesa-api
          image: mesa-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: mesa-config
            - secretRef:
                name: mesa-secrets
                optional: false
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
