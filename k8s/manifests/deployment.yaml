apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesa-web
  labels:
    app.kubernetes.io/name: mesa-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: mesa-conecta-game
  annotations:
    argocd-image-updater.argoproj.io/image-list: mesa-web=ghcr.io/brunobdevoceanoazul/mesa-conecta-game/mesa-web
    argocd-image-updater.argoproj.io/mesa-web.update-strategy: newest-build
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mesa-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mesa-web
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mesa-web
          image: ghcr.io/brunobdevoceanoazul/mesa-conecta-game/mesa-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: mesa-web-config
            - secretRef:
                name: mesa-web-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
