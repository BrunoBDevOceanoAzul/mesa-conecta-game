apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mesa-web
spec:
  groups:
    - name: mesa-web.rules
      rules:
        - alert: MesaWebDeploymentUnavailable
          expr: kube_deployment_status_replicas_available{deployment="mesa-web-staging", namespace="mesa-staging"} < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Mesa staging frontend is unavailable
            description: No available replicas for mesa-web-staging in namespace mesa-staging for more than 5 minutes.
        - alert: MesaWebRestartingFrequently
          expr: increase(kube_pod_container_status_restarts_total{namespace="mesa-staging", container="mesa-web"}[15m]) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Mesa staging frontend is restarting frequently
            description: mesa-web in staging restarted more than 3 times in the last 15 minutes.
